<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- warm charcoal tile: bridges the blog's Tufte cream palette and a dark terminal -->
  <rect x="0" y="0" width="64" height="64" rx="13" fill="#1b1a18"/>
  <!-- lowercase v (cream) + block cursor (amber) = a live terminal prompt -->
  <text x="32" y="48" text-anchor="middle"
        font-family="JetBrainsMono Nerd Font, JetBrains Mono, monospace"
        font-size="42" font-weight="700">
    <tspan fill="#f5efe1">v</tspan><tspan fill="#e8a33d">█</tspan>
  </text>
</svg>
