name: Refresh tree-sitter-perl grammar

# Once a day, pull the latest tree-sitter-perl release (the wasm + highlight
# query that power build-time Perl syntax highlighting). If it changed, open a
# PR. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest tree-sitter-perl release
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run vendor:perl-grammar

      - name: Open a PR if the grammar changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- vendor/tree-sitter-perl; then
            echo "Grammar unchanged — nothing to do."
            exit 0
          fi
          TAG=$(cat vendor/tree-sitter-perl/RELEASE_TAG)
          BRANCH="vendor/tsp-$TAG"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists — PR already opened for $TAG."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add vendor/tree-sitter-perl
          git commit -m "vendor: bump tree-sitter-perl grammar to $TAG"
          git push origin "$BRANCH"
          gh pr create \
            --base master --head "$BRANCH" \
            --title "vendor: bump tree-sitter-perl grammar to $TAG" \
            --body "A new \`tree-sitter-perl\` release (**$TAG**) is out. This refreshes the vendored \`tree-sitter-perl.wasm\` + \`highlights.scm\` behind the build-time Perl syntax highlighting.

          Before merging, eyeball the highlighting on the \`parsing-perl\` post — especially the stacked-heredoc example — with \`npm run build\` / \`./serve\`.

          🤖 Automated by \`.github/workflows/refresh-grammar.yml\`."
